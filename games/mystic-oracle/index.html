<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mystic Oracle — Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="../../" class="nav__brand">Snackbox</a>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="app-container">
    <div class="stars" id="stars"></div>

    <div class="container">
      <h1>The Mystic Oracle</h1>

      <div id="inputPhase">
        <div class="instructions">
          <p>Have your friend think of a question for the oracle...</p>
          <p class="ritual-text">Then type the ancient incantation to summon the oracle's wisdom</p>
        </div>

        <input type="text" id="mysticalInput" placeholder="Type the incantation...">
        <div class="hidden-answer" id="hiddenAnswer"></div>

        <button class="button" id="consultBtn">Consult the Oracle</button>
      </div>

      <div class="oracle-chamber" id="oracleChamber">
        <div class="crystal-ball">
          <div class="mist"></div>
        </div>
        <p style="font-size: 1.3em; opacity: 0.8;">The oracle peers through the veil of reality...</p>
      </div>

      <div class="revelation" id="revelation"></div>

      <button class="button" id="resetButton">Ask Another Question</button>
    </div>
  </div>

  <script src="../../shared/theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
