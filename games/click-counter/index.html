<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Counter — Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="../../index.html" class="nav__brand">Snackbox</a>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="app-container">
    <h1>Click Counter</h1>
    <p class="score">Score: <span id="score">0</span></p>
    <button id="click-btn">Click Me!</button>
    <button id="reset-btn" class="btn-secondary">Reset</button>
  </div>

  <script src="../../shared/theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
