<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick the Winner — Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="../../" class="nav__brand">Snackbox</a>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="app-container">
    <h1>Pick the Winner</h1>

    <!-- Start Screen -->
    <div id="start-screen">
      <p class="instructions">Three emoji racers compete in a dash to the finish line.<br>Pick the winner before the race ends — the sooner you pick, the more points you earn!<br>5 rounds. Choose wisely.</p>
      <button id="start-btn">Start</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      <div class="stats-row">
        <div class="stat-box">
          <span class="stat-label">Score</span>
          <span id="score-display" class="stat-value">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Round</span>
          <span id="round-display" class="stat-value">1/5</span>
        </div>
      </div>
      <canvas id="game-canvas" width="900" height="400"></canvas>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="hidden">
      <h2 class="gameover-title">Game Over</h2>
      <div class="final-score-display">
        <span class="final-score-label">Final Score</span>
        <span id="final-score" class="final-score-value">0</span>
      </div>
      <button id="play-again-btn">Play Again</button>
    </div>
  </div>

  <script src="../../shared/theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
