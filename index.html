<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav__brand">Snackbox</span>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="container">
    <h1>Snackbox</h1>
    <p style="margin-bottom: 2rem; color: var(--color-text-secondary);">A collection of web games, tools, and calculators.</p>

    <section class="section">
      <h2>Games</h2>
      <div class="card-grid">
        <div class="card">
          <a href="games/click-counter/index.html">Click Counter</a>
          <p>Click the button as fast as you can!</p>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Tools</h2>
      <div class="card-grid">
        <div class="card">
          <a href="tools/text-counter/index.html">Text Counter</a>
          <p>Count characters, words, and lines in any text.</p>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Calculators</h2>
      <div class="card-grid">
        <div class="card">
          <a href="calculators/unit-converter/index.html">Unit Converter</a>
          <p>Convert between kilometers and miles.</p>
        </div>
      </div>
    </section>
  </div>

  <script src="shared/theme.js"></script>
</body>
</html>
