<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav__brand">Snackbox</span>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="container">
    <section class="section">
      <h2>Games</h2>
      <div class="card-grid">
        <div class="card">
          <a href="games/click-counter/index.html">Click Counter <span class="card__desc">Click the button as fast as you can!</span></a>
        </div>
        <div class="card">
          <a href="games/memory-game/index.html">Memory Game <span class="card__desc">Match pairs of emoji cards before time runs out!</span></a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Tools</h2>
      <div class="card-grid">
        <div class="card">
          <a href="tools/text-counter/index.html">Text Counter <span class="card__desc">Count characters, words, and lines in any text.</span></a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Calculators</h2>
      <div class="card-grid">
        <div class="card">
          <a href="calculators/unit-converter/index.html">Unit Converter <span class="card__desc">Convert between kilometers and miles.</span></a>
        </div>
      </div>
    </section>
  </div>

  <script src="shared/theme.js"></script>
</body>
</html>
