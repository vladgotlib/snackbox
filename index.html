<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav__brand">Snackbox</span>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="container">
    <section class="section">
      <h2>Games</h2>
      <div class="card-grid">
        <div class="card">
          <a href="games/memory-game/" title="Match pairs of emoji cards before time runs out!">🧠 Memory Game</a>
        </div>
        <div class="card">
          <a href="games/color-stroop/" title="Stroop test! Type the ink color, not the word. 60-second blitz.">🎨 Type the Color</a>
        </div>
        <div class="card">
          <a href="games/bouncer/" title="Keep the puck alive and collect stars!">&#127934; Bouncer</a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Tools</h2>
      <div class="card-grid">
        <div class="card">
          <a href="tools/text-counter/" title="Count characters, words, and lines in any text.">📝 Text Counter</a>
        </div>
        <div class="card">
          <a href="tools/queue-wait/" title="Estimate how long until your number is called.">⏳ Queue Wait Estimator</a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Calculators</h2>
      <div class="card-grid">
        <div class="card">
          <a href="calculators/unit-converter/" title="Convert between kilometers and miles.">📏 Unit Converter</a>
        </div>
        <div class="card">
          <a href="calculators/powerball-odds/" title="See why you'll never win the Powerball jackpot.">🎱 Powerball Odds</a>
        </div>
      </div>
    </section>
  </div>

  <script src="shared/theme.js"></script>
</body>
</html>
