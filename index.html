<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body>
  <nav class="nav">
    <span class="nav__brand">Snackbox</span>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="container">
    <section class="section">
      <h2>Games</h2>
      <div class="card-grid">
        <div class="card">
          <a href="games/memory-game/" title="Match pairs of emoji cards before time runs out!">
            <span class="card__title">🧠 Memory Game</span>
          </a>
        </div>
        <div class="card">
          <a href="games/color-stroop/" title="Stroop test! Type the ink color, not the word. 60-second blitz.">
            <span class="card__title">🎨 Type the Color</span>
          </a>
        </div>
        <div class="card">
          <a href="games/bouncer/" title="Keep the puck alive and collect stars!">
            <span class="card__title">&#127934; Bouncer</span>
          </a>
        </div>
        <div class="card">
          <a href="games/tower-stacker/" title="Drop blocks to build the tallest tower!">
            <span class="card__title">&#127959; Tower Stacker</span>
          </a>
        </div>
        <div class="card">
          <a href="games/race-picker/" title="Pick the winning racer before the race ends!">
            <span class="card__title">&#127943; Pick the Winner</span>
          </a>
        </div>
        <div class="card">
          <a href="games/sniper/" title="Time your shot through spinning gaps to hit the target!">
            <span class="card__title">&#127919; Sniper</span>
          </a>
        </div>
        <div class="card">
          <a href="games/mystic-oracle/" title="A mystical oracle that reads minds... or does it?">
            <span class="card__title">&#128302; Mystic Oracle</span>
          </a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Tools</h2>
      <div class="card-grid">
        <div class="card">
          <a href="tools/queue-wait/" title="Estimate how long until your number is called.">
            <span class="card__title">⏳ Queue Wait Estimator</span>
          </a>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Calculators</h2>
      <div class="card-grid">
        <div class="card">
          <a href="calculators/powerball-odds/" title="See why you'll never win the Powerball jackpot.">
            <span class="card__title">🎱 Powerball Odds</span>
          </a>
        </div>
      </div>
    </section>
  </div>

  <script src="shared/theme.js"></script>
</body>
</html>
