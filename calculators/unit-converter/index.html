<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter — Snackbox</title>
  <script>
    (function(){var t=localStorage.getItem('snackbox-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();
  </script>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="../../" class="nav__brand">Snackbox</a>
    <span class="nav__spacer"></span>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9790;</button>
  </nav>

  <div class="app-container">
    <h1>Unit Converter</h1>
    <div class="converter">
      <div class="field">
        <label for="km">Kilometers</label>
        <input type="number" id="km" placeholder="0">
      </div>
      <span class="arrow">⇄</span>
      <div class="field">
        <label for="miles">Miles</label>
        <input type="number" id="miles" placeholder="0">
      </div>
    </div>
  </div>

  <script src="../../shared/theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
