<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Counter — Snackbox</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <a href="../../" class="nav__brand">Snackbox</a>
    <a href="../../" class="nav__link">Home</a>
  </nav>

  <div class="app-container">
    <h1>Text Counter</h1>
    <textarea id="text-input" rows="8" placeholder="Paste or type your text here..."></textarea>
    <div class="stats">
      <div class="stat">
        <span class="stat__value" id="chars">0</span>
        <span class="stat__label">Characters</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="words">0</span>
        <span class="stat__label">Words</span>
      </div>
      <div class="stat">
        <span class="stat__value" id="lines">0</span>
        <span class="stat__label">Lines</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
